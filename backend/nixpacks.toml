[phases.setup]
nixPkgs = [
  "python311",
  "chromium",
  "playwright-driver",
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium",
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/usr/lib/playwright"
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "0"
